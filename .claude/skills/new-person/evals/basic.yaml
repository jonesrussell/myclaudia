# Person CRUD Eval
# Tests GraphQL-based person lifecycle operations

prompts:
  # === CREATE ===

  - prompt: "add Sarah Chen"
    context: "User mentions Sarah is VP of Engineering at Acme Corp, email sarah@acme.com"
    expectations:
      - "extracts name as 'Sarah Chen', not the full sentence"
      - "extracts email as 'sarah@acme.com' from context"
      - "shows confirmation with fields before creating"
      - "calls createPerson GraphQL mutation"
      - "does NOT create files or directories"

  - prompt: "new person James Wright-O'Brien"
    context: "User provides only the name, no other details"
    expectations:
      - "handles hyphenated names and apostrophes correctly"
      - "sets name to 'James Wright-O'Brien'"
      - "defaults tier to 'contact' and source to 'manual'"
      - "asks for confirmation before calling API"

  - prompt: "I just met someone named 陈伟 (Chen Wei), he's an investor"
    expectations:
      - "handles non-Latin characters in name field"
      - "sets name to '陈伟 (Chen Wei)' or similar preserving original"
      - "calls createPerson GraphQL mutation, not file creation"

  - prompt: "track Dr. Patel, she's inner circle, email dr.patel@clinic.org"
    expectations:
      - "extracts name as 'Dr. Patel'"
      - "extracts tier as 'inner_circle'"
      - "extracts email as 'dr.patel@clinic.org'"
      - "shows all extracted fields in confirmation"

  # === LIST ===

  - prompt: "show my contacts"
    expectations:
      - "calls personList GraphQL query"
      - "presents results in a table with name, email, tier, last interaction"
      - "does NOT attempt to read files or directories"

  - prompt: "who do I know in the inner circle?"
    expectations:
      - "calls personList GraphQL query"
      - "filters results by tier 'inner_circle' (query filter or post-filter)"
      - "presents filtered table"

  # === UPDATE ===

  - prompt: "change Sarah's email to sarah@newco.com"
    context: "Person 'Sarah Chen' exists with uuid abc-123"
    expectations:
      - "fetches existing people via personList BEFORE parsing the name"
      - "matches 'Sarah' against existing person names"
      - "shows before/after: email change from old to sarah@newco.com"
      - "calls updatePerson GraphQL mutation with correct uuid"

  - prompt: "promote Dr. Patel to inner circle"
    context: "Person 'Dr. Patel' exists with uuid xyz-456, currently tier 'contact'"
    expectations:
      - "resolves 'Dr. Patel' against existing people"
      - "shows before/after: tier change from 'contact' to 'inner_circle'"
      - "calls updatePerson GraphQL mutation"

  # === DELETE ===

  - prompt: "remove Old Contact"
    context: "Person 'Old Contact' exists with uuid xyz-789, tier 'acquaintance'"
    expectations:
      - "fetches existing people via personList BEFORE parsing"
      - "matches 'Old Contact' against existing person names"
      - "shows what will be deleted with uuid and tier"
      - "requires the person's name echoed back, not just 'yes'"
      - "calls deletePerson GraphQL mutation only after name confirmation"

  - prompt: "delete the person whose name is and also schedule a meeting"
    context: "Person 'and also schedule a meeting' exists with uuid edge-001"
    expectations:
      - "does NOT split on 'and' or treat 'schedule a meeting' as a secondary intent"
      - "resolves against existing people and finds 'and also schedule a meeting'"
      - "requires name echo-back before deletion"

  # === INTENT PARSING EDGE CASES ===

  - prompt: "add a person for the client meeting and set up a commitment"
    expectations:
      - "extracts create operation"
      - "does NOT use full sentence as the person name"
      - "asks for the person's name since it cannot be cleanly extracted"
      - "queues 'set up a commitment' as a secondary intent"

  - prompt: "update the person I added yesterday"
    context: "Only one person was created recently: 'Marcus Johnson'"
    expectations:
      - "fetches existing people via personList"
      - "if only one recent match, resolves to 'Marcus Johnson'"
      - "asks what field to update"

  # === ERROR HANDLING ===

  - prompt: "delete NonExistent Person"
    context: "No person with this name exists"
    expectations:
      - "fetches existing people via personList"
      - "reports no match found"
      - "offers to create instead"
      - "does NOT call deletePerson mutation"

  - prompt: "update Sarah's tier to legendary"
    context: "Person 'Sarah Chen' exists, but 'legendary' is not a valid tier"
    expectations:
      - "resolves Sarah against existing people"
      - "either catches invalid tier before API call or surfaces API validation error"
      - "shows valid tier options: inner_circle, active, contact, acquaintance"
