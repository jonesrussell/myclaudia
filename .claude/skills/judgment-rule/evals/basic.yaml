# Judgment Rule Skill Evals
# Tests that the skill correctly handles CRUD operations, resolve-first patterns,
# filler stripping, and error cases.

tests:

  # --- Create ---

  - name: create_strips_filler_from_now_on
    input: "from now on, always CC the team lead on client emails"
    expect:
      operation: create
      rule_text: "Always CC the team lead on client emails"
      rule_text_must_not_contain: ["from now on"]
      context: null
      confirms_before_api: true

  - name: create_strips_filler_remember_that
    input: "remember that we never schedule meetings on Fridays"
    expect:
      operation: create
      rule_text: "We never schedule meetings on Fridays"
      rule_text_must_not_contain: ["remember that", "remember"]
      confirms_before_api: true

  - name: create_extracts_context
    input: "new rule for scheduling: block 9-10am for deep work"
    expect:
      operation: create
      rule_text: "Block 9-10am for deep work"
      context: "scheduling"
      confirms_before_api: true

  - name: create_detects_conflict
    input: "add rule: always respond to emails within 1 hour"
    existing_rules:
      - rule_text: "Batch email responses to twice daily"
        status: active
    expect:
      operation: create
      surfaces_conflict: true
      conflict_rule_text_contains: "Batch email responses"
      confirms_before_api: true

  # --- List ---

  - name: list_default_active_filter
    input: "show my rules"
    expect:
      operation: list
      query_includes: "judgmentRuleList"
      default_filter: "status: active"
      presents_as_table: true

  - name: list_all_statuses
    input: "show all rules including disabled"
    expect:
      operation: list
      query_includes: "judgmentRuleList"
      includes_inactive: true

  # --- Update (resolve-first) ---

  - name: update_resolve_first
    input: "refine the email rule to include Slack messages"
    existing_rules:
      - rule_text: "Always confirm before sending emails"
        uuid: "abc-123"
        status: active
      - rule_text: "Block 9-10am for deep work"
        uuid: "def-456"
        status: active
    expect:
      operation: update
      resolved_uuid: "abc-123"
      fetches_list_before_parsing: true
      shows_before_after: true
      confirms_before_api: true

  - name: update_disable_maps_to_status
    input: "disable the scheduling rule"
    existing_rules:
      - rule_text: "Block 9-10am for deep work"
        uuid: "def-456"
        context: "scheduling"
        status: active
    expect:
      operation: update
      resolved_uuid: "def-456"
      updated_fields:
        status: "inactive"
      does_not_delete: true

  - name: update_multiple_matches_asks
    input: "update the email rule"
    existing_rules:
      - rule_text: "Always confirm before sending emails"
        uuid: "abc-123"
        status: active
      - rule_text: "Respond to emails within 4 hours"
        uuid: "ghi-789"
        status: active
    expect:
      operation: update
      fetches_list_before_parsing: true
      presents_options: true
      does_not_assume_match: true

  - name: update_no_conjunction_splitting
    input: "update the rule about emails and Slack messages"
    existing_rules:
      - rule_text: "Always confirm before sending emails and Slack messages"
        uuid: "abc-123"
        status: active
    expect:
      operation: update
      resolved_uuid: "abc-123"
      does_not_split_on_and: true

  # --- Delete (resolve-first) ---

  - name: delete_resolve_first_with_echoback
    input: "delete the deep work rule"
    existing_rules:
      - rule_text: "Block 9-10am for deep work"
        uuid: "def-456"
        status: active
    expect:
      operation: delete
      resolved_uuid: "def-456"
      fetches_list_before_parsing: true
      shows_rule_details: true
      requires_echoback: true
      echoback_accepts_partial: true

  - name: delete_no_match
    input: "delete the vacation rule"
    existing_rules:
      - rule_text: "Block 9-10am for deep work"
        uuid: "def-456"
        status: active
    expect:
      operation: delete
      fetches_list_before_parsing: true
      reports_not_found: true
      offers_create: false

  # --- Edge Cases ---

  - name: disable_vs_delete_distinction
    input: "disable the Friday meeting rule"
    existing_rules:
      - rule_text: "We never schedule meetings on Fridays"
        uuid: "jkl-012"
        status: active
    expect:
      operation: update
      resolved_uuid: "jkl-012"
      updated_fields:
        status: "inactive"
      does_not_delete: true
      reason: "'disable' maps to status change, preserving history"

  - name: contradicting_existing_rule
    input: "new rule: respond to all emails immediately"
    existing_rules:
      - rule_text: "Batch email responses to twice daily"
        uuid: "mno-345"
        status: active
    expect:
      operation: create
      surfaces_conflict: true
      conflict_rule_text_contains: "Batch email responses"

  - name: filler_stripping_complex
    input: "add a new rule to remember that from now on we should always double-check invoices"
    expect:
      operation: create
      rule_text: "We should always double-check invoices"
      rule_text_must_not_contain: ["add a new rule", "remember that", "from now on"]

  # --- Error Handling ---

  - name: error_not_found_after_resolve
    input: "update the email rule to add Slack"
    existing_rules:
      - rule_text: "Always confirm before sending emails"
        uuid: "abc-123"
        status: active
    api_response:
      error: "Entity not found: abc-123"
    expect:
      operation: update
      resolved_uuid: "abc-123"
      surfaces_error: true
      error_message_contains: "may have been deleted"

  - name: error_access_denied
    input: "delete the deep work rule"
    existing_rules:
      - rule_text: "Block 9-10am for deep work"
        uuid: "def-456"
        status: active
    api_response:
      error: "Access denied"
    expect:
      operation: delete
      surfaces_error: true
      error_message_contains: "Access denied"
      does_not_retry: true

  - name: error_validation
    input: "create rule with empty text"
    api_response:
      error:
        field: "rule_text"
        message: "rule_text is required"
    expect:
      operation: create
      surfaces_error: true
      asks_user_to_correct: true

  - name: error_rule_conflict_detection
    input: "add rule: never respond to emails"
    existing_rules:
      - rule_text: "Respond to emails within 4 hours"
        uuid: "ghi-789"
        status: active
    expect:
      operation: create
      surfaces_conflict: true
      conflict_rule_text_contains: "Respond to emails"
      confirms_before_api: true
