# Workspace CRUD Eval
# Tests GraphQL-based workspace lifecycle operations
# Includes regression test for the original conjunction-splitting bug

schema_version: "1.0"
skill: new-workspace
entity_type: workspace

tests:
  # === CREATE ===

  - name: create-acme-corp
    operation: create
    input: "create a workspace for Acme Corp"
    assertions:
      - type: field_extraction
        field: name
        should_match: "Acme Corp"
        must_not_equal: "create a workspace for Acme Corp"
      - type: confirmation_shown
      - type: graphql_operation
        operation: createWorkspace
      - type: no_file_operations

  - name: create-from-repo-identifier
    operation: create
    input: "new workspace jonesrussell/me so we can do some milestone planning"
    assertions:
      - type: field_extraction
        field: name
        should_match: "me"
        must_not_equal: "new workspace jonesrussell/me so we can do some milestone planning"
      - type: secondary_intent_queued
        intent: "milestone planning"
      - type: graphql_operation
        operation: createWorkspace

  - name: create-ambiguous-name
    operation: create
    input: "set up a project workspace and link the GitHub repo"
    assertions:
      - type: field_extraction
        field: name
        must_not_equal: "set up a project workspace and link the GitHub repo"
      - type: asks_for_field
        field: name
      - type: secondary_intent_queued
        intent: "link the GitHub repo"

  # === LIST ===

  - name: list-all-workspaces
    operation: list
    input: "show my workspaces"
    assertions:
      - type: graphql_operation
        operation: workspaceList
        mutation: false
      - type: table_presented
        columns: [name, status, mode, created]
      - type: no_file_operations

  - name: list-active-workspaces
    operation: list
    input: "list active workspaces"
    assertions:
      - type: graphql_operation
        operation: workspaceList
        mutation: false
      - type: filter_applied
        field: status
        value: active

  # === UPDATE ===

  - name: rename-acme-corp
    operation: update
    input: "rename Acme Corp to Acme Corporation"
    context:
      existing_entities:
        - uuid: abc-123
          fields:
            name: "Acme Corp"
    assertions:
      - type: resolve_first
      - type: before_after_shown
      - type: graphql_operation
        operation: updateWorkspace

  - name: archive-old-test
    operation: update
    input: "mark the old test workspace as archived"
    context:
      existing_entities:
        - uuid: xyz-456
          fields:
            name: "old test"
    assertions:
      - type: resolve_first
      - type: before_after_shown
      - type: graphql_operation
        operation: updateWorkspace

  # === DELETE ===

  - name: delete-old-test
    operation: delete
    input: "delete the old test workspace"
    context:
      existing_entities:
        - uuid: xyz-789
          fields:
            name: "old test"
    assertions:
      - type: resolve_first
      - type: confirmation_shown
      - type: echo_back_required
        field: name
      - type: graphql_operation
        operation: deleteWorkspace

  # === CONJUNCTION BUG REGRESSION ===

  - name: delete-workspace-with-and-in-name
    operation: delete
    input: "delete the 'and clone jonesrussell/me so we can do some milestone planning' workspace"
    context:
      existing_entities:
        - uuid: edge-001
          fields:
            name: "and clone jonesrussell/me so we can do some milestone planning"
    tags: [regression]
    assertions:
      - type: no_conjunction_split
      - type: resolve_first
      - type: echo_back_required
        field: name

  - name: delete-workspace-plan-and-execute
    operation: delete
    input: "remove the workspace called 'plan and execute the migration'"
    context:
      existing_entities:
        - uuid: edge-002
          fields:
            name: "plan and execute the migration"
    tags: [regression]
    assertions:
      - type: no_conjunction_split
      - type: resolve_first

  # === INTENT PARSING EDGE CASES ===

  - name: create-with-secondary-add-person
    operation: create
    input: "create a workspace and also add a person"
    tags: [edge-case]
    assertions:
      - type: field_extraction
        field: name
        must_not_equal: "create a workspace and also add a person"
      - type: asks_for_field
        field: name
      - type: secondary_intent_queued
        intent: "add a person"

  - name: update-recent-workspace
    operation: update
    input: "update the workspace I made yesterday"
    context:
      existing_entities:
        - uuid: recent-001
          fields:
            name: "Sprint Planning"
      notes: "Only one workspace was created recently"
    tags: [edge-case]
    assertions:
      - type: resolve_first
      - type: asks_for_field
        field: update_target

  # === ERROR HANDLING ===

  - name: delete-nonexistent-workspace
    operation: delete
    input: "delete NonExistent Workspace"
    context:
      notes: "No workspace with this name exists"
    tags: [error-handling]
    assertions:
      - type: resolve_first
      - type: error_surfaced
      - type: offers_alternative
        alternative: create

  - name: update-invalid-status
    operation: update
    input: "update workspace status to legendary"
    context:
      existing_entities:
        - uuid: abc-123
          fields:
            name: "Acme Corp"
      notes: "'legendary' is not a valid status"
    tags: [error-handling]
    assertions:
      - type: resolve_first
      - type: error_surfaced
