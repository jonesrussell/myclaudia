pre-commit:
  parallel: true
  commands:
    php-lint:
      glob: "*.php"
      run: vendor/bin/pint --dirty --test
    python-lint:
      glob: "agent/*.py"
      run: python3 -m py_compile {staged_files}

pre-push:
  parallel: false
  commands:
    lint:
      run: composer lint
    analyse:
      run: composer analyse
    php-tests:
      run: vendor/bin/phpunit --testsuite Unit
    python-tests:
      run: cd agent && python3 -m pytest tests/ -q
