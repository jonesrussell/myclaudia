name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Analyse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        working-directory: claudriel
        run: composer install --no-interaction --prefer-dist

      - name: Check formatting (Pint)
        working-directory: claudriel
        run: composer lint

      - name: Static analysis (PHPStan)
        working-directory: claudriel
        run: composer analyse

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        working-directory: claudriel
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: claudriel
        run: composer test

  sidecar:
    name: Sidecar (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claudriel/docker/sidecar
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Test (pytest)
        run: pytest

  admin-build:
    name: Admin Bundle Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claudriel/frontend/admin
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: claudriel/frontend/admin/package-lock.json

      - name: Install frontend/admin dependencies
        run: npm ci

      - name: Build vendored admin bundle
        run: npm run build
