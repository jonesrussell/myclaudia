name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-rsync:
    name: Deploy rsync rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6
      - name: Verify deploy rsync rules
        run: ./bin/verify-deploy-rsync

  lint:
    name: Lint & Analyse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Waaseyaa framework provenance
        env:
          WAASEYAA_GOLDEN_SHA: ${{ vars.WAASEYAA_GOLDEN_SHA }}
        run: |
          if [ ! -x bin/waaseyaa-version ]; then
            echo '::notice::bin/waaseyaa-version missing; skipping provenance'
            exit 0
          fi
          if ! php -r 'require "vendor/autoload.php"; exit(class_exists(\Waaseyaa\CLI\Provenance\ComposerProvenanceReporter::class) ? 0 : 1);'; then
            echo '::notice::Installed waaseyaa/cli predates ComposerProvenanceReporter; skipping until composer update pulls a newer split.'
            exit 0
          fi
          if [ -n "${WAASEYAA_GOLDEN_SHA:-}" ]; then
            ./bin/waaseyaa-version
          else
            ./bin/waaseyaa-version --report-only
          fi

      - name: Check formatting (Pint)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer analyse

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Waaseyaa framework provenance
        env:
          WAASEYAA_GOLDEN_SHA: ${{ vars.WAASEYAA_GOLDEN_SHA }}
        run: |
          if [ ! -x bin/waaseyaa-version ]; then
            echo '::notice::bin/waaseyaa-version missing; skipping provenance'
            exit 0
          fi
          if ! php -r 'require "vendor/autoload.php"; exit(class_exists(\Waaseyaa\CLI\Provenance\ComposerProvenanceReporter::class) ? 0 : 1);'; then
            echo '::notice::Installed waaseyaa/cli predates ComposerProvenanceReporter; skipping until composer update pulls a newer split.'
            exit 0
          fi
          if [ -n "${WAASEYAA_GOLDEN_SHA:-}" ]; then
            ./bin/waaseyaa-version
          else
            ./bin/waaseyaa-version --report-only
          fi

      - name: Run tests
        run: composer test

  agent:
    name: Agent (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e 'agent[dev]'

          for matcher in .github/matchers/*.json; do
            echo "::add-matcher::$matcher"
          done
        shell: bash
        working-directory: .

      - name: Black
        working-directory: agent
        run: black --check claudriel_agent tests main.py eval_runner.py eval_contracts.py eval_benchmark.py

      - name: Ruff
        working-directory: agent
        run: ruff check claudriel_agent tests main.py eval_runner.py eval_contracts.py eval_benchmark.py --output-format github

      - name: Mypy
        working-directory: agent
        run: mypy

      - name: Pytest
        working-directory: agent
        run: python -m pytest tests/

      - name: Verify syntax
        working-directory: agent
        run: |
          import ast
          from pathlib import Path

          roots = [
              Path("claudriel_agent"),
              Path("tests"),
          ]
          files = [p for r in roots for p in r.rglob("*.py")]
          for extra in ("main.py", "eval_runner.py", "eval_contracts.py", "eval_benchmark.py"):
              p = Path(extra)
              if p.is_file():
                  files.append(p)
          for f in files:
              ast.parse(f.read_text(encoding="utf-8"))
        shell: python

  admin-build:
    name: Admin Bundle Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install frontend/admin dependencies
        run: npm ci

      - name: Build vendored admin bundle
        run: npm run build

  admin-e2e:
    name: Admin E2E (Playwright smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Composer dependencies
        working-directory: .
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install frontend/admin dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e
        env:
          CI: true
        run: npm run test:e2e
