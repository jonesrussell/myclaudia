name: Deploy Claudriel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      # -------------------------------------------------------------------
      # PHP setup
      # -------------------------------------------------------------------

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Composer dependencies
        working-directory: claudriel
        run: |
          composer install \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      - name: Run phpstan
        working-directory: claudriel
        run: composer analyse

      - name: Run tests
        working-directory: claudriel
        run: composer test

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify agent syntax
        working-directory: claudriel/agent
        run: python -c "import ast, pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('.').rglob('*.py')]"

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Composer dependencies (production)
        working-directory: claudriel
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: claudriel/frontend/admin/package-lock.json

      - name: Build admin SPA
        working-directory: claudriel/frontend/admin
        run: |
          npm ci
          npm run generate
          rm -rf ../../public/admin
          cp -r .output/public ../../public/admin

      - name: Assemble build artifact
        run: |
          mkdir -p claudriel/build
          rsync -aL \
            --exclude='.git' \
            --exclude='build/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            --exclude='skills/' \
            claudriel/ claudriel/build/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: deploy-artifact
          path: claudriel/build/
          retention-days: 3

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: build

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: claudriel/build/

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Deployer dependencies
        working-directory: claudriel
        run: composer install --no-interaction --optimize-autoloader --prefer-dist

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan claudriel.northcloud.one >> ~/.ssh/known_hosts

      - name: Deploy to staging
        working-directory: claudriel
        run: vendor/bin/dep deploy staging --no-interaction -vv

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: claudriel/build/

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Deployer dependencies
        working-directory: claudriel
        run: composer install --no-interaction --optimize-autoloader --prefer-dist

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan 147.182.150.145 >> ~/.ssh/known_hosts

      - name: Deploy to production
        working-directory: claudriel
        run: vendor/bin/dep deploy production --no-interaction -vv
