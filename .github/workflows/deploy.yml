name: Deploy to claudriel.northcloud.one

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      # -------------------------------------------------------------------
      # PHP setup
      # -------------------------------------------------------------------

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Composer dependencies
        working-directory: claudriel
        run: |
          composer install \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      - name: Run phpstan
        working-directory: claudriel
        run: composer analyse

      - name: Run tests
        working-directory: claudriel
        run: composer test

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar dependencies
        working-directory: claudriel/docker/sidecar
        run: pip install -r requirements.txt

      - name: Run sidecar lint
        working-directory: claudriel/docker/sidecar
        run: ruff check app/

      - name: Run sidecar tests
        working-directory: claudriel/docker/sidecar
        run: pytest

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: verify

    steps:
      - name: Checkout claudriel
        uses: actions/checkout@v4
        with:
          path: claudriel

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install Composer dependencies (production)
        working-directory: claudriel
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      - name: Assemble build artifact
        run: |
          mkdir -p claudriel/.build
          rsync -aL \
            --exclude='.git' \
            --exclude='.build/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            claudriel/ claudriel/.build/

      - name: Install PHP Deployer
        run: composer global require deployer/deployer --no-interaction

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan claudriel.northcloud.one >> ~/.ssh/known_hosts

      - name: Deploy
        working-directory: claudriel
        run: dep deploy production --no-interaction -vv
